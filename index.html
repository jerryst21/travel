<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Travel</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #555;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #777;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon">📅</span>
        <h1>Belum Ada Jadwal</h1>
        <p>Mohon maaf, saat ini tidak ada jadwal travel untuk sementara waktu. Silakan cek kembali nanti.</p>
    </div>

</body>
</html>
