<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Pengingat Otomatis</title>
  <link rel="icon" href="../uploads/2026-07-04-notification-bell.png" type="image/png" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #475569;
      --border: #cbd5e1;
      --success: #10b981;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: start;
      min-height: 100vh;
    }
    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px; /* Diperlebar sedikit agar lebih lega */
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      padding: 20px;
      border: 1px solid var(--border);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
    }
    .header span {
      font-size: 24px;
    }
    .header h1 {
      font-size: 19px;
      font-weight: 700;
    }
    .status-banner {
      background-color: #f8fafc;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px; /* Teks status diperbesar */
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .form-group {
      margin-bottom: 16px; /* Jarak antar input diperlebar */
    }
    .form-group label {
      display: block;
      font-size: 14px; /* Judul input diperbesar agar mudah dibaca */
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .form-control {
      width: 100%;
      padding: 12px 14px; /* Padding dipertebal agar area klik/ketik luas */
      font-size: 16px; /* Ukuran teks 16px mencegah auto-zoom mengganggu di HP/iOS */
      border: 2px solid var(--border); /* Garis border dipertebal */
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: var(--text);
      line-height: 1.5;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    textarea.form-control {
      resize: none; /* Matikan resize manual pojok kanan bawah */
      min-height: 80px;
      overflow-y: hidden; /* Sembunyikan scrollbar bawaan untuk efek auto-expand */
    }
    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px; /* Tombol lebih tebal dan mudah ditekan */
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .btn:disabled {
      background: #cbd5e1;
      color: #94a3b8;
      cursor: not-allowed;
    }

    /* --- STYLE MODAL POP-UP SUKSES --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .modal-overlay.show .modal-content {
      transform: scale(1);
    }
    .modal-icon {
      font-size: 48px;
      color: var(--success);
      margin-bottom: 12px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-text {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .btn-close {
      background: #0f172a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* --- STYLE DASHBOARD ANTRIAN & RIWAYAT (FASE 2) --- */
    .dashboard-section {
      margin-top: 20px;
      border-top: 2px dashed #e2e8f0;
      padding-top: 16px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1;
      background: #f1f5f9;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }
    .list-container {
      display: none;
      max-height: 260px; /* Membatasi tinggi agar tidak banyak scrolling di HP */
      overflow-y: auto;
      padding-right: 4px;
    }
    .list-container.active {
      display: block;
    }
    .reminder-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .item-meta {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .item-header {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .item-msg {
      color: var(--text-muted);
      white-space: pre-wrap;
      font-size: 12.5px;
      background: #ffffff;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      margin-top: 4px;
    }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <span>📢</span>
      <h1>Tambah Pengingat Baru</h1>
    </div>

    <div class="status-banner" id="connection-status">
      🔄 Memvalidasi koneksi ke server...
    </div>

    <form id="reminder-form">
      <div class="form-group">
        <label for="scheduled_time">Jadwal Tanggal & Jam</label>
        <input type="datetime-local" id="scheduled_time" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="msg_header">Perihal</label>
        <input type="text" id="msg_header" class="form-control" placeholder="Contoh: Appointment drg Dinar" required>
      </div>

      <div class="form-group">
        <label for="contact-select">Dikirim Ke</label>
        <select id="contact-select" class="form-control" required>
          <option value="" disabled selected>-- Pilih Kontak / Grup --</option>
          <option value="6282178609889-1478937044@g.us|Keluarga">Keluarga</option>
          <option value="628114340889-1490322038@g.us|Jerry & Siska">Jerry & Siska</option>
          <option value="628118955508|Linda">Linda</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Isi Pesan</label>
        <textarea id="message" class="form-control" placeholder="Tulis pesan pengingat di sini..." rows="3" required></textarea>
      </div>

      <button type="submit" class="btn" id="btn-submit" disabled>💾 Simpan Pengingat</button>
    </form>

    <div class="dashboard-section">
      <div class="tabs">
        <button type="button" class="tab-btn active" onclick="switchTab('pending-list', this)">⏳ Antrean Pending</button>
        <button type="button" class="tab-btn" onclick="switchTab('sent-list', this)">✅ 20 Terakhir Terkirim</button>
      </div>
      
      <div id="pending-list" class="list-container active">
        <div class="empty-state">🔄 Memuat antrean aktif...</div>
      </div>
      
      <div id="sent-list" class="list-container">
        <div class="empty-state">🔄 Memuat riwayat kirim...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="success-modal">
    <div class="modal-content">
      <div class="modal-icon">✅</div>
      <div class="modal-title">Berhasil Disimpan</div>
      <div class="modal-text">Pengingat otomatis Anda telah berhasil dicatat ke dalam antrean database database Supabase.</div>
      <button class="btn-close" onclick="tutupModal()">Tutup</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('reminder-form');
    const textarea = document.getElementById('message');
    const statusBanner = document.getElementById('connection-status');
    const btnSubmit = document.getElementById('btn-submit');
    const successModal = document.getElementById('success-modal');

    // 1. LOGIKA AUTO-EXPAND TEXTAREA (Otomatis memanjang ke bawah saat teks banyak)
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    // 2. CEK KONEKSI DASAR SAAT HALAMAN DIBUKA
    async function cekKoneksiDasar() {
      try {
        const response = await fetch('/api/check-reminders?secret=123456');
        const data = await response.json();
        
        if (response.ok) {
          statusBanner.style.backgroundColor = '#ecfdf5';
          statusBanner.style.borderColor = '#a7f3d0';
          statusBanner.style.color = '#065f46';
          statusBanner.innerHTML = `✅ <strong>Koneksi Aman.</strong> Sisa antrean aktif: ${data.total_antrean_pending || 0} data.`;
          btnSubmit.disabled = false;
        } else {
          throw new Error(data.error || 'Gagal memverifikasi token');
        }
      } catch (error) {
        statusBanner.style.backgroundColor = '#fef2f2';
        statusBanner.style.borderColor = '#fca5a5';
        statusBanner.style.color = '#991b1b';
        statusBanner.innerHTML = `❌ <strong>Koneksi Gagal:</strong> ${error.message}`;
      }
    }

    // 3. PROSES SIMPAN PENGINGAT (CRUD POST KE BACKEND)
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Ambil nilai komposit dari dropdown kontak (Format: nomor|nama)
      const contactValue = document.getElementById('contact-select').value;
      const [phoneNumber, recipientName] = contactValue.split('|');

      // Siapkan payload data sesuai struktur database Supabase Anda
      const payload = {
        scheduled_time: document.getElementById('scheduled_time').value + ':00+00', // Sesuai format waktu tampilan Anda
        msg_header: document.getElementById('msg_header').value,
        message: document.getElementById('message').value,
        phone_number: phoneNumber,
        recipient: recipientName,
        status: 'pending'
      };

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '⏳ Menyimpan...';

      try {
        // Mengirimkan data ke API Route Save Anda
        const response = await fetch('/api/save-reminder?secret=123456', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          // Jika sukses, munculkan Modal Pop Up
          successModal.classList.add('show');
          // Kosongkan form input
          form.reset();
          // Kembalikan ukuran tinggi textarea ke semula
          textarea.style.height = 'auto';
          muatDaftarPengingat();
        } else {
          const errData = await response.json();
          alert('Gagal menyimpan: ' + (errData.error || 'Terjadi kesalahan pada server'));
        }
      } catch (error) {
        alert('Gagal mengirim data ke server: ' + error.message);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '💾 Simpan Pengingat';
        // Perbarui info sisa antrean di banner atas
        cekKoneksiDasar();
      }
    });

    // --- LOGIKA DASHBOARD FETCH & TABS (FASE 2) ---
    function switchTab(tabId, btn) {
      document.querySelectorAll('.list-container').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function formatWaktuTampilan(isoString) {
      if (!isoString) return '-';
      
      // Ambil karakter tanggal & jam saja (YYYY-MM-DDTHH:mm), buang embel-embel +00 atau Z
      const waktuLokalMurni = isoString.replace('Z', '').split('+')[0].replace(' ', 'T').substring(0, 16);
      
      // Paksa browser membaca angka jam asli dari database tanpa konversi/pergeseran UTC
      const d = new Date(waktuLokalMurni);
      
      return d.toLocaleString('id-ID', { 
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
      }).replace(',', '') + ' WITA';
    }

    async function muatDaftarPengingat() {
      const pendingCont = document.getElementById('pending-list');
      const sentCont = document.getElementById('sent-list');
      
      try {
        const res = await fetch('/api/list-reminders');
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Gagal memuat data dashboard');

        // Render Antrean Pending
        if (data.pending && data.pending.length > 0) {
          pendingCont.innerHTML = data.pending.map(item => `
            <div class="reminder-item">
              <div class="item-meta">
                <span>📅 ${formatWaktuTampilan(item.scheduled_time)}</span>
                <span>👤 ${item.recipient}</span>
              </div>
              <div class="item-header">📌 ${item.msg_header}</div>
              <div class="item-msg">${item.message}</div>
            </div>
          `).join('');
        } else {
          pendingCont.innerHTML = '<div class="empty-state">🎉 Semua pengingat aman, antrean kosong!</div>';
        }

        // Render 20 Terakhir Terkirim
        if (data.sent && data.sent.length > 0) {
          sentCont.innerHTML = data.sent.map(item => `
            <div class="reminder-item" style="border-left: 3px solid var(--success);">
              <div class="item-meta">
                <span style="color: var(--success)">✅ Terkirim: ${formatWaktuTampilan(item.date_sent || item.scheduled_time)}</span>
                <span>👤 ${item.recipient}</span>
              </div>
              <div class="item-header">📌 ${item.msg_header}</div>
              <div class="item-msg">${item.message}</div>
            </div>
          `).join('');
        } else {
          sentCont.innerHTML = '<div class="empty-state">Belum ada riwayat pesan terkirim.</div>';
        }

      } catch (err) {
        pendingCont.innerHTML = `<div class="empty-state" style="color:red;">⚠️ ${err.message}</div>`;
        sentCont.innerHTML = `<div class="empty-state" style="color:red;">⚠️ ${err.message}</div>`;
      }
    }

    // 4. FUNGSI MENUTUP MODAL POP UP
    function tutupModal() {
      successModal.classList.remove('show');
    }

    // Jalankan verifikasi koneksi saat halaman siap
    // penanganan onload memuat kedua fungsi sekaligus
    window.onload = function() {
      cekKoneksiDasar();
      muatDaftarPengingat();
    };
  </script>

</body>
</html>
