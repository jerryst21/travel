<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Pengingat Otomatis</title>
  <link rel="icon" href="../uploads/2026-07-04-notification-bell.png" type="image/png" />
  <style>
    :root {
      --primary: #4f46e5; /* Modern soft indigo */
      --primary-hover: #4338ca;
      --bg: #f8fafc; /* Slate background yang bersih */
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --radius-lg: 14px;
      --radius-md: 10px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: start;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px;
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 4px 12px -4px rgba(0, 0, 0, 0.02);
      padding: 22px;
      border: 1px solid rgba(226, 232, 240, 0.8);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .header span {
      font-size: 22px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .status-banner {
      background-color: #f1f5f9;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      margin-bottom: 18px;
      line-height: 1.4;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      outline: none;
      background: #f8fafc;
      color: var(--text);
      line-height: 1.5;
      transition: all 0.2s ease;
    }
    .form-control:focus {
      background: #ffffff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    textarea.form-control {
      resize: none;
      min-height: 74px;
      overflow-y: hidden;
    }
    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    }
    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.2);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* --- STYLE MODAL POP-UP SUKSES --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal-content {
      transform: scale(1);
    }
    .modal-icon {
      font-size: 44px;
      color: var(--success);
      margin-bottom: 10px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .modal-text {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .btn-close {
      background: #0f172a;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-close:hover {
      background: #1e293b;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <span>📢</span>
      <h1>Tambah Pengingat Baru</h1>
    </div>

    <div class="status-banner" id="connection-status">
      🔄 Memvalidasi koneksi ke server...
    </div>

    <form id="reminder-form">
      <div class="form-group">
        <label for="scheduled_time">Jadwal Tanggal & Jam</label>
        <input type="datetime-local" id="scheduled_time" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="msg_header">Perihal</label>
        <input type="text" id="msg_header" class="form-control" placeholder="Contoh: Appointment drg Dinar" required>
      </div>

      <div class="form-group">
        <label for="contact-select">Dikirim Ke</label>
        <select id="contact-select" class="form-control" required>
          <option value="" disabled selected>-- Pilih Kontak / Grup --</option>
          <option value="6282178609889-1478937044@g.us|Keluarga">Keluarga</option>
          <option value="628114340889-1490322038@g.us|Jerry & Siska">Jerry & Siska</option>
          <option value="628118955508|Linda">Linda</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Isi Pesan</label>
        <textarea id="message" class="form-control" placeholder="Tulis pesan pengingat di sini..." rows="3" required></textarea>
      </div>

      <button type="submit" class="btn" id="btn-submit" disabled>💾 Simpan Pengingat</button>
    </form>
  </div>

  <div class="modal-overlay" id="success-modal">
    <div class="modal-content">
      <div class="modal-icon">✅</div>
      <div class="modal-title">Berhasil Disimpan</div>
      <div class="modal-text">Pengingat otomatis Anda telah berhasil dicatat ke dalam antrean database database Supabase.</div>
      <button class="btn-close" onclick="tutupModal()">Tutup</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('reminder-form');
    const textarea = document.getElementById('message');
    const statusBanner = document.getElementById('connection-status');
    const btnSubmit = document.getElementById('btn-submit');
    const successModal = document.getElementById('success-modal');

    // 1. LOGIKA AUTO-EXPAND TEXTAREA
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    // 2. FORMAT JAM WITA (PERBAIKAN BUG BUFFER JAM DATABASE)
    function formatWaktuTampilan(isoString) {
      if (!isoString) return '-';
      const waktuLokalMurni = isoString.replace('Z', '').split('+')[0].replace(' ', 'T').substring(0, 16);
      const d = new Date(waktuLokalMurni);
      return d.toLocaleString('id-ID', { 
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
      }).replace(',', '') + ' WITA';
    }

    // 3. SATU AMBILAN TOTAL (Koneksi Banner + Render Isi Antrean Dashboard)
    async function muatDataDashboard() {
      try {
        const res = await fetch('/api/reminders');
        if (!res.ok) throw new Error('Gagal melakukan sinkronisasi dengan server');
    
        // Perbarui Banner Koneksi menjadi sukses
        statusBanner.style.backgroundColor = '#ecfdf5';
        statusBanner.style.borderColor = '#a7f3d0';
        statusBanner.style.color = '#065f46';
        statusBanner.innerHTML = `✅ <strong>Koneksi Aman.</strong> Server siap menerima pengingat baru.`;
        btnSubmit.disabled = false;
    
      } catch (err) {
        // Jika koneksi down
        statusBanner.style.backgroundColor = '#fef2f2';
        statusBanner.style.borderColor = '#fca5a5';
        statusBanner.style.color = '#991b1b';
        statusBanner.innerHTML = `❌ <strong>Koneksi Gagal:</strong> ${err.message}`;
        btnSubmit.disabled = true;
      }
    }

    // 4. PROSES SIMPAN PENGINGAT (POST)
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const contactValue = document.getElementById('contact-select').value;
      const [phoneNumber, recipientName] = contactValue.split('|');

      const payload = {
        scheduled_time: document.getElementById('scheduled_time').value + ':00+00',
        msg_header: document.getElementById('msg_header').value,
        message: document.getElementById('message').value,
        phone_number: phoneNumber,
        recipient: recipientName,
        status: 'pending'
      };

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '⏳ Menyimpan...';

      try {
        // Mengirim langsung ke Router Tunggal tanpa secret token (Aman)
        const response = await fetch('/api/reminders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          successModal.classList.add('show');
          form.reset();
          textarea.style.height = 'auto';
          // Segarkan data dashboard seketika setelah berhasil menyimpan
          muatDataDashboard();
        } else {
          const errData = await response.json();
          alert('Gagal menyimpan: ' + (errData.error || 'Terjadi kesalahan pada server'));
        }
      } catch (error) {
        alert('Gagal mengirim data ke server: ' + error.message);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '💾 Simpan Pengingat';
      }
    });

    // 5. FUNGSI UTILITAS POP UP CLOSING
    function tutupModal() {
      successModal.classList.remove('show');
    }

    // Trigger pemanggilan data tunggal saat halaman siap dibuka
    window.onload = muatDataDashboard;
  </script>

</body>
</html>
