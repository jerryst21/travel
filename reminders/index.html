<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Pengingat Otomatis</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #475569;
      --border: #cbd5e1;
      --success: #10b981;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: start;
      min-height: 100vh;
    }
    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 480px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      padding: 20px;
      border: 1px solid var(--border);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
    }
    .header span {
      font-size: 24px;
    }
    .header h1 {
      font-size: 19px;
      font-weight: 700;
    }
    .status-banner {
      background-color: #f8fafc;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .form-control {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: #fff;
      color: var(--text);
      line-height: 1.5;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    textarea.form-control {
      resize: none;
      min-height: 80px;
      overflow-y: hidden;
    }
    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .btn:disabled {
      background: #cbd5e1;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .modal-overlay.show .modal-content {
      transform: scale(1);
    }
    .modal-icon {
      font-size: 48px;
      color: var(--success);
      margin-bottom: 12px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-text {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .btn-close {
      background: #0f172a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <span>📢</span>
      <h1>Tambah Pengingat Baru</h1>
    </div>

    <div class="status-banner" id="connection-status">
      🔄 Memvalidasi koneksi ke server...
    </div>

    <form id="reminder-form">
      <div class="form-group">
        <label for="scheduled_time">Jadwal Tanggal & Jam</label>
        <input type="datetime-local" id="scheduled_time" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="msg_header">Perihal</label>
        <input type="text" id="msg_header" class="form-control" placeholder="Contoh: Appointment drg Dinar" required>
      </div>

      <div class="form-group">
        <label for="contact-select">Dikirim Ke</label>
        <select id="contact-select" class="form-control" required>
          <option value="" disabled selected>-- Pilih Kontak / Grup --</option>
          <option value="6282178609889-1478937044@g.us|Keluarga">Keluarga</option>
          <option value="628114340889-1490322038@g.us|Jerry & Siska">Jerry & Siska</option>
          <option value="628118955508|Linda">Linda</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Isi Pesan</label>
        <textarea id="message" class="form-control" placeholder="Tulis pesan pengingat di sini..." rows="3" required></textarea>
      </div>

      <button type="submit" class="btn" id="btn-submit" disabled>💾 Simpan Pengingat</button>
    </form>
  </div>

  <div class="modal-overlay" id="success-modal">
    <div class="modal-content">
      <div class="modal-icon">✅</div>
      <div class="modal-title">Berhasil Disimpan</div>
      <div class="modal-text">Pengingat otomatis Anda telah berhasil dicatat ke dalam sistem antrean.</div>
      <button class="btn-close" onclick="tutupModal()">Tutup</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('reminder-form');
    const textarea = document.getElementById('message');
    const statusBanner = document.getElementById('connection-status');
    const btnSubmit = document.getElementById('btn-submit');
    const successModal = document.getElementById('success-modal');

    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    async function cekKoneksiDasar() {
      try {
        // Melakukan ping cek token dasar, aman tanpa mengembalikan sisa antrean ke layar publik
        const response = await fetch('/api/reminders?secret=123456');
        
        if (response.ok) {
          statusBanner.style.backgroundColor = '#ecfdf5';
          statusBanner.style.borderColor = '#a7f3d0';
          statusBanner.style.color = '#065f46';
          statusBanner.innerHTML = `✅ <strong>Sistem Siap.</strong> Silakan masukkan pengingat baru.`;
          btnSubmit.disabled = false;
        } else {
          throw new Error('Gagal memverifikasi token pengaman');
        }
      } catch (error) {
        statusBanner.style.backgroundColor = '#fef2f2';
        statusBanner.style.borderColor = '#fca5a5';
        statusBanner.style.color = '#991b1b';
        statusBanner.innerHTML = `❌ <strong>Koneksi Terganggu:</strong> Silakan hubungi Administrator.`;
      }
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const contactValue = document.getElementById('contact-select').value;
      const [phoneNumber, recipientName] = contactValue.split('|');

      const payload = {
        scheduled_time: document.getElementById('scheduled_time').value + ':00+00',
        msg_header: document.getElementById('msg_header').value,
        message: document.getElementById('message').value,
        phone_number: phoneNumber,
        recipient: recipientName,
        status: 'pending'
      };

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '⏳ Menyimpan...';

      try {
        const response = await fetch('/api/save-reminder?secret=123456', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          successModal.classList.add('show');
          form.reset();
          textarea.style.height = 'auto';
        } else {
          const errData = await response.json();
          alert('Gagal menyimpan: ' + (errData.error || 'Terjadi kesalahan sistem'));
        }
      } catch (error) {
        alert('Gagal mengirim data ke server: ' + error.message);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '💾 Simpan Pengingat';
      }
    });

    function tutupModal() {
      successModal.classList.remove('show');
    }

    window.onload = cekKoneksiDasar;
  </script>
</body>
</html>
