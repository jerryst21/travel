<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Pengingat Telegram</title>
  <link rel="icon" href="../uploads/2026-07-04-notification-bell.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --primary: #24a1de; 
      --primary-gradient: linear-gradient(135deg, #24a1de, #1a80b0);
      --primary-hover: #1d82b2;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --radius-lg: 12px;
      --radius-md: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 12px; display: flex; justify-content: center; align-items: start; min-height: 100vh; }
    
    /* Compact & Modern Card Structure */
    .card { background: var(--card-bg); width: 100%; max-width: 460px; border-radius: var(--radius-lg); box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); padding: 16px; border: 1px solid var(--border); }
    
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .header i { font-size: 20px; color: var(--primary); }
    .header h1 { font-size: 16px; font-weight: 700; color: #0f172a; }
    
    .status-banner { background-color: #f8fafc; border: 1px solid var(--border); padding: 8px 12px; border-radius: var(--radius-md); font-size: 12px; margin-bottom: 12px; font-weight: 500; text-align: center; }
    
    /* Compact Form Fields */
    .form-group { margin-bottom: 10px; }
    .form-group label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
    .form-group label i { color: var(--primary); font-size: 12px; }
    .form-control { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); outline: none; background: #f8fafc; color: var(--text); transition: all 0.2s; }
    .form-control:focus { background: #ffffff; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(36, 161, 222, 0.15); }
    textarea.form-control { resize: none; min-height: 60px; }
    
    /* Modern Styling Action Components */
    .btn { width: 100%; background: var(--primary-gradient); color: white; border: none; padding: 10px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; transition: all 0.2s; box-shadow: 0 3px 8px rgba(36, 161, 222, 0.2); }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 5px 12px rgba(36, 161, 222, 0.3); }
    .btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }
    .btn-helper { display: inline-flex; align-items: center; gap: 6px; background: #f0f9ff; color: #0284c7; padding: 6px 12px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600; text-decoration: none; margin-bottom: 12px; width: 100%; justify-content: center; border: 1px solid #bae6fd; transition: all 0.2s; }
    .btn-helper:hover { background: #e0f2fe; }
    
    /* Micro Chips Component Layout */
    .contact-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .chip-label { display: inline-flex; align-items: center; gap: 6px; background: #f8fafc; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.2s; }
    .chip-label input[type="radio"] { accent-color: var(--primary); scale: 1; margin: 0; }
    .chip-label:hover { border-color: #cbd5e1; background: #f1f5f9; }
    .chip-label.selected { background: #e0f2fe; border-color: var(--primary); color: #0369a1; box-shadow: 0 2px 6px rgba(36, 161, 222, 0.1); }
  
    /* Smooth Overlay Pop Up Windows */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-content { background: white; padding: 20px; border-radius: var(--radius-lg); width: 90%; max-width: 320px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .btn-close { background: #0f172a; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-close:hover { background: #1e293b; }
    
    /* Dense High-Data Dashboard Lists */
    .dashboard-section { margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 12px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 10px; background: #f1f5f9; padding: 3px; border-radius: 8px; }
    .tab-btn { flex: 1; background: transparent; border: none; padding: 6px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 4px; }
    .tab-btn.active { background: var(--card-bg); color: var(--text); box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05); }
    .list-container { display: none; max-height: 240px; overflow-y: auto; padding-right: 2px; }
    .list-container.active { display: block; }
    .reminder-item { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 10px; margin-bottom: 6px; font-size: 12.5px; }
    .item-meta { display: flex; justify-content: space-between; font-weight: 600; color: var(--primary); margin-bottom: 3px; font-size: 11.5px; }
    .item-header { font-weight: 700; color: #0f172a; margin-bottom: 2px; }
    .item-msg { color: var(--text-muted); white-space: pre-wrap; font-size: 12px; background: #ffffff; padding: 4px 6px; border-radius: 4px; border: 1px solid #e2e8f0; margin-top: 2px; line-height: 1.3; }
    .empty-state { text-align: center; color: var(--text-muted); font-size: 12px; padding: 16px 0; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <i class="fa-brands fa-telegram"></i>
      <h1>Tambah Pengingat Telegram</h1>
    </div>

    <div class="status-banner" id="connection-status">
      <i class="fa-solid fa-spinner fa-spin"></i> Memvalidasi koneksi Telegram Engine...
    </div>

    <a href="https://t.me/UsernameBotAnda" target="_blank" class="btn-helper">
      <i class="fa-solid fa-robot"></i> Klik Sini & Tekan /start Jika Belum Aktivasi Bot
    </a>

    <form id="reminder-form">
      <div class="form-group">
        <label for="scheduled_time"><i class="fa-regular fa-calendar-check"></i> Jadwal Tanggal & Jam</label>
        <input type="datetime-local" id="scheduled_time" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="msg_header"><i class="fa-solid fa-tag"></i> Perihal / Subjek</label>
        <input type="text" id="msg_header" class="form-control" placeholder="Contoh: Jadwal Kontrol Pasien" required>
      </div>

      <div class="form-group">
        <label><i class="fa-regular fa-user"></i> Pilih Nama Penerima</label>
        <div class="contact-chips">
          <label class="chip-label" id="chip-jerry">
            <input type="radio" name="quick_recipient" value="7754794501" data-name="Jerry" onchange="pilihPenerimaOtomatis(this)">
            <span><i class="fa-solid fa-circle-user"></i> Jerry</span>
          </label>
        </div>
      </div>

      <input type="hidden" id="chat_id">
      <input type="hidden" id="recipient">

      <div class="form-group">
        <label for="message"><i class="fa-regular fa-comment-dots"></i> Isi Pesan Pengingat</label>
        <textarea id="message" class="form-control" placeholder="Tulis pesan di sini..." rows="3" required></textarea>
      </div>

      <button type="submit" class="btn" id="btn-submit" disabled>
        <i class="fa-solid fa-paper-plane"></i> Simpan ke Antrean Telegram
      </button>
    </form>

    <div class="dashboard-section">
      <div class="tabs">
        <button type="button" class="tab-btn active" onclick="switchTab('pending-list', this)">
          <i class="fa-solid fa-hourglass-half"></i> Antrean Pending
        </button>
        <button type="button" class="tab-btn" onclick="switchTab('sent-list', this)">
          <i class="fa-solid fa-circle-check"></i> Terkirim
        </button>
      </div>
      
      <div id="pending-list" class="list-container active">
        <div class="empty-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat antrean aktif...</div>
      </div>
      
      <div id="sent-list" class="list-container">
        <div class="empty-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat riwayat...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="success-modal">
    <div class="modal-content">
      <div class="modal-icon" style="font-size:38px; color:var(--success); margin-bottom:8px;">
        <i class="fa-solid fa-circle-check"></i>
      </div>
      <div class="modal-title" style="font-size:16px; font-weight:700; margin-bottom: 6px; color:#0f172a;">Berhasil Disimpan</div>
      <div class="modal-text" style="font-size:13px; color:var(--text-muted); margin-bottom:14px; line-height:1.4;">Pengingat telah dicatat ke dalam database tabel telereminders.</div>
      <button class="btn-close" onclick="tutupModal()">Tutup</button>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('reminder-form');
    const textarea = document.getElementById('message');
    const statusBanner = document.getElementById('connection-status');
    const btnSubmit = document.getElementById('btn-submit');
    const successModal = document.getElementById('success-modal');

    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    function switchTab(tabId, btn) {
      document.querySelectorAll('.list-container').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    // Fungsi Auto-Fill & Highlight saat kartu diklik
    function pilihPenerimaOtomatis(radio) {
      document.querySelectorAll('.chip-label').forEach(el => el.classList.remove('selected'));
      if (radio.checked) {
        radio.parentElement.classList.add('selected');
        document.getElementById('chat_id').value = radio.value;
        document.getElementById('recipient').value = radio.getAttribute('data-name');
      }
    }

    function formatWaktuTampilan(isoString) {
      if (!isoString) return '-';
      const waktuLokalMurni = isoString.replace('Z', '').split('+')[0].replace(' ', 'T').substring(0, 16);
      const d = new Date(waktuLokalMurni);
      return d.toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) + ' WITA';
    }

    async function muatDataDashboard() {
      const pendingCont = document.getElementById('pending-list');
      const sentCont = document.getElementById('sent-list');
      
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const grupParam = urlParams.get('grup') || '';
        const res = await fetch(`/api/tele83?grup=${encodeURIComponent(grupParam)}`);
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Gagal sinkronisasi data');

        statusBanner.style.backgroundColor = '#ecfdf5';
        statusBanner.style.borderColor = '#a7f3d0';
        statusBanner.style.color = '#065f46';
        statusBanner.innerHTML = `✅ <strong>Database Telegram Aktif.</strong> Antrean pending: ${data.total_antrean_pending || 0} data.`;
        btnSubmit.disabled = false;

        if (data.pending && data.pending.length > 0) {
          pendingCont.innerHTML = data.pending.map(item => `
            <div class="reminder-item">
              <div class="item-meta">
                <span>📅 ${formatWaktuTampilan(item.scheduled_time)}</span>
                <span>👤 ${item.recipient || 'Tanpa Nama'}</span>
              </div>
              <div class="item-header">📌 ${item.msg_header || 'Tanpa Perihal'}</div>
              <div class="item-msg">${item.message || ''}</div>
            </div>
          `).join('');
        } else {
          pendingCont.innerHTML = '<div class="empty-state">🎉 Antrean Telegram bersih dan kosong!</div>';
        }
        
        if (data.sent && data.sent.length > 0) {
          sentCont.innerHTML = data.sent.map(item => `
            <div class="reminder-item" style="border-left: 3px solid var(--success);">
              <div class="item-meta">
                <span style="color: var(--success)">✅ Terkirim: ${formatWaktuTampilan(item.date_sent || item.scheduled_time)}</span>
                <span>👤 ${item.recipient || 'Tanpa Nama'}</span>
              </div>
              <div class="item-header">📌 ${item.msg_header || 'Tanpa Perihal'}</div>
              <div class="item-msg">${item.message || ''}</div>
            </div>
          `).join('');
        } else {
          sentCont.innerHTML = '<div class="empty-state">Belum ada riwayat pesan terkirim via Telegram.</div>';
        }

      } catch (err) {
        statusBanner.style.backgroundColor = '#fef2f2';
        statusBanner.style.borderColor = '#fca5a5';
        statusBanner.style.color = '#991b1b';
        statusBanner.innerHTML = `❌ <strong>Koneksi Gagal:</strong> ${err.message}`;
      }
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const chatId = document.getElementById('chat_id').value.trim();
      const recipientName = document.getElementById('recipient').value.trim();
      
      // Validasi proteksi jika user lupa memilih kartu nama
      if (!chatId || !recipientName) {
        alert('Silakan pilih salah satu penerima terlebih dahulu!');
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const grupParam = urlParams.get('grup') || '';
      
      const payload = {
        scheduled_time: document.getElementById('scheduled_time').value + ':00+00',
        msg_header: document.getElementById('msg_header').value,
        message: document.getElementById('message').value,
        chat_id: chatId,
        recipient: recipientName,
        status: 'pending',
        grup: grupParam
      };

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '⏳ Menyimpan...';

      try {
        const response = await fetch('/api/tele83', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          successModal.classList.add('show');
          form.reset();
          document.querySelectorAll('.chip-label').forEach(el => el.classList.remove('selected'));
          textarea.style.height = 'auto';
          muatDataDashboard();
        } else {
          const errData = await response.json();
          alert('Gagal menyimpan: ' + (errData.error || 'Terjadi kesalahan'));
        }
      } catch (error) {
        alert('Gagal mengirim data: ' + error.message);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '💾 Simpan ke Antrean Telegram';
      }
    });

    function tutupModal() { successModal.classList.remove('show'); }
    window.onload = muatDataDashboard;
  </script>
</body>
</html>
