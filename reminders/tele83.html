<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Pengingat Telegram</title>
  <style>
    /* Menggunakan style dasar yang sama agar tetap kompak, modern, dan padat data */
    :root {
      --primary: #24a1de; /* Warna Khas Telegram Blue */
      --primary-hover: #1d82b2;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --radius-lg: 14px;
      --radius-md: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 20px 16px; display: flex; justify-content: center; align-items: start; min-height: 100vh; }
    .card { background: var(--card-bg); width: 100%; max-width: 480px; border-radius: var(--radius-lg); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); padding: 22px; border: 1px solid var(--border); }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .header span { font-size: 22px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .status-banner { background-color: #f1f5f9; border: 1px solid var(--border); padding: 10px 14px; border-radius: var(--radius-md); font-size: 13.5px; margin-bottom: 18px; font-weight: 500; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
    .form-control { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: var(--radius-md); outline: none; background: #f8fafc; color: var(--text); }
    .form-control:focus { background: #ffffff; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(36, 161, 222, 0.1); }
    textarea.form-control { resize: none; min-height: 74px; }
    .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; box-shadow: 0 4px 12px rgba(36, 161, 222, 0.15); transition: all 0.2s; }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
    .btn-helper { display: inline-flex; align-items: center; gap: 6px; background: #e0f2fe; color: #0369a1; padding: 8px 12px; border-radius: 6px; font-size: 12.5px; font-weight: 600; text-decoration: none; margin-bottom: 12px; width: 100%; justify-content: center; border: 1px solid #bae6fd; transition: all 0.2s; }
    .btn-helper:hover { background: #bae6fd; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-content { background: white; padding: 24px; border-radius: var(--radius-lg); width: 90%; max-width: 360px; text-align: center; }
    .btn-close { background: #0f172a; color: white; border: none; padding: 9px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .dashboard-section { margin-top: 18px; border-top: 1px dashed var(--border); padding-top: 16px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; background: #f1f5f9; padding: 4px; border-radius: 8px; }
    .tab-btn { flex: 1; background: transparent; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--text-muted); }
    .tab-btn.active { background: var(--card-bg); color: var(--text); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05); }
    .list-container { display: none; max-height: 260px; overflow-y: auto; }
    .list-container.active { display: block; }
    .reminder-item { background: #f8fafc; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; margin-bottom: 8px; font-size: 13px; }
    .item-meta { display: flex; justify-content: space-between; font-weight: 600; color: var(--primary); margin-bottom: 4px; }
    .item-header { font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .item-msg { color: var(--text-muted); white-space: pre-wrap; font-size: 12px; background: #ffffff; padding: 6px 8px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 4px; }
    .empty-state { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <span>🔹</span>
      <h1>Tambah Pengingat Telegram</h1>
    </div>

    <div class="status-banner" id="connection-status">
      🔄 Memvalidasi koneksi Telegram Engine...
    </div>

    <a href="https://t.me/UsernameBotAnda" target="_blank" class="btn-helper">
      🤖 1. Klik Sini & Tekan /start untuk Aktivasi Bot
    </a>

    <form id="reminder-form">
      <div class="form-group">
        <label for="scheduled_time">Jadwal Tanggal & Jam</label>
        <input type="datetime-local" id="scheduled_time" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="msg_header">Perihal</label>
        <input type="text" id="msg_header" class="form-control" placeholder="Contoh: Jadwal Kontrol Pasien" required>
      </div>

      <div class="form-group">
        <div class="form-group">
          <label for="chat_id">2. Chat ID Telegram Penerima</label>
          <input type="text" id="chat_id" class="form-control" placeholder="Contoh: 123456789" required>
        </div>
        
        <div class="form-group">
          <label for="recipient">Nama Penerima</label>
          <input type="text" id="recipient" class="form-control" placeholder="Contoh: Linda" required>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Isi Pesan Pengingat</label>
        <textarea id="message" class="form-control" placeholder="Tulis pesan di sini..." rows="3" required></textarea>
      </div>

      <button type="submit" class="btn" id="btn-submit" disabled>💾 Simpan ke Antrean Telegram</button>
    </form>

    <div class="dashboard-section">
      <div class="tabs">
        <button type="button" class="tab-btn active" onclick="switchTab('pending-list', this)">⏳ Antrean Pending</button>
        <button type="button" class="tab-btn" onclick="switchTab('sent-list', this)">✅ Terkirim</button>
      </div>
      
      <div id="pending-list" class="list-container active">
        <div class="empty-state">🔄 Memuat antrean aktif...</div>
      </div>
      
      <div id="sent-list" class="list-container">
        <div class="empty-state">🔄 Memuat riwayat...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="success-modal">
    <div class="modal-content">
      <div class="modal-icon" style="font-size:44px; color:var(--success);">✅</div>
      <div class="modal-title" style="font-size:18px; font-weight:700; margin: 10px 0 6px;">Berhasil Disimpan</div>
      <div class="modal-text" style="font-size:14px; color:var(--text-muted); margin-bottom:18px;">Pengingat telah dicatat ke dalam database tabel telereminders.</div>
      <button class="btn-close" onclick="tutupModal()">Tutup</button>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('reminder-form');
    const textarea = document.getElementById('message');
    const statusBanner = document.getElementById('connection-status');
    const btnSubmit = document.getElementById('btn-submit');
    const successModal = document.getElementById('success-modal');

    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    function switchTab(tabId, btn) {
      document.querySelectorAll('.list-container').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function formatWaktuTampilan(isoString) {
      if (!isoString) return '-';
      const waktuLokalMurni = isoString.replace('Z', '').split('+')[0].replace(' ', 'T').substring(0, 16);
      const d = new Date(waktuLokalMurni);
      return d.toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) + ' WITA';
    }

    async function muatDataDashboard() {
      const pendingCont = document.getElementById('pending-list');
      const sentCont = document.getElementById('sent-list');
      
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const grupParam = urlParams.get('grup') || '';
        const res = await fetch(`/api/tele83?grup=${encodeURIComponent(grupParam)}`);
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Gagal sinkronisasi data');

        statusBanner.style.backgroundColor = '#ecfdf5';
        statusBanner.style.borderColor = '#a7f3d0';
        statusBanner.style.color = '#065f46';
        statusBanner.innerHTML = `✅ <strong>Database Telegram Aktif.</strong> Antrean pending: ${data.total_antrean_pending || 0} data.`;
        btnSubmit.disabled = false;

        if (data.pending && data.pending.length > 0) {
          pendingCont.innerHTML = data.pending.map(item => `
            <div class="reminder-item">
              <div class="item-meta">
                <span>📅 ${formatWaktuTampilan(item.scheduled_time)}</span>
                <span>🆔 ID: ${item.chat_id || ''} (${item.recipient || 'Tanpa Nama'})</span>
              </div>
              <div class="item-header">📌 ${item.msg_header || 'Tanpa Perihal'}</div>
              <div class="item-msg">${item.message || ''}</div>
            </div>
          `).join('');
        } else {
          pendingCont.innerHTML = '<div class="empty-state">🎉 Antrean Telegram bersih dan kosong!</div>';
        }
        
        if (data.sent && data.sent.length > 0) {
          sentCont.innerHTML = data.sent.map(item => `
            <div class="reminder-item" style="border-left: 3px solid var(--success);">
              <div class="item-meta">
                <span style="color: var(--success)">✅ Terkirim: ${formatWaktuTampilan(item.date_sent || item.scheduled_time)}</span>
                <span>🆔 ID: ${item.chat_id || ''}</span>
              </div>
              <div class="item-header">📌 ${item.msg_header || 'Tanpa Perihal'}</div>
              <div class="item-msg">${item.message || ''}</div>
            </div>
          `).join('');
        } else {
          sentCont.innerHTML = '<div class="empty-state">Belum ada riwayat pesan terkirim via Telegram.</div>';
        }

      } catch (err) {
        statusBanner.style.backgroundColor = '#fef2f2';
        statusBanner.style.borderColor = '#fca5a5';
        statusBanner.style.color = '#991b1b';
        statusBanner.innerHTML = `❌ <strong>Koneksi Gagal:</strong> ${err.message}`;
      }
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const chatId = document.getElementById('chat_id').value.trim();
      const recipientName = document.getElementById('recipient').value.trim();
      const urlParams = new URLSearchParams(window.location.search);
      const grupParam = urlParams.get('grup') || '';
      
      const payload = {
        scheduled_time: document.getElementById('scheduled_time').value + ':00+00',
        msg_header: document.getElementById('msg_header').value,
        message: document.getElementById('message').value,
        chat_id: chatId,
        recipient: recipientName,
        status: 'pending',
        grup: grupParam
      };

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '⏳ Menyimpan...';

      try {
        const response = await fetch('/api/tele83', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          successModal.classList.add('show');
          form.reset();
          textarea.style.height = 'auto';
          muatDataDashboard();
        } else {
          const errData = await response.json();
          alert('Gagal menyimpan: ' + (errData.error || 'Terjadi kesalahan'));
        }
      } catch (error) {
        alert('Gagal mengirim data: ' + error.message);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '💾 Simpan ke Antrean Telegram';
      }
    });

    function tutupModal() { successModal.classList.remove('show'); }
    window.onload = muatDataDashboard;
  </script>
</body>
</html>
